  <rect x="452" y="716" width="168" height="60" rx="6" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="536" y="740" text-anchor="middle" fill="#888" font-size="10" letter-spacing="1">CADENCE</text>
