  <text x="84" y="212" fill="#888" font-size="11">Google + Reddit (r/DelhiNCR, r/SkincareAddiction) + Quora India</text>
  <text x="580" y="196" text-anchor="end" fill="#22c55e" font-size="11">keywords · PAA · LSI</text>

